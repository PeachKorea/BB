<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도넛 가게 수익 시뮬레이터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 860px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  header p { font-size: 13px; color: #888; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e8; padding: 1.5rem; margin-bottom: 1.2rem; }
  .card-title { font-size: 12px; font-weight: 700; color: #888; margin-bottom: 1.1rem; letter-spacing: 0.06em; text-transform: uppercase; }
  .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.4rem; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label { font-size: 12px; color: #888; font-weight: 600; }
  .input-wrapper { position: relative; display: flex; align-items: center; }
  .input-wrapper input[type="number"] { width: 100%; padding: 10px 36px 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 9px; font-size: 14px; font-weight: 600; color: #1a1a1a; background: #fafafa; outline: none; transition: border-color 0.15s; -moz-appearance: textfield; }
  .input-wrapper input[type="number"]::-webkit-outer-spin-button, .input-wrapper input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .input-wrapper input[type="number"]:focus { border-color: #7c7cef; background: #fff; box-shadow: 0 0 0 3px rgba(124,124,239,0.08); }
  .input-wrapper .unit { position: absolute; right: 10px; font-size: 12px; color: #aaa; pointer-events: none; }
  .slider-row { display: flex; align-items: center; gap: 14px; }
  .slider-row label { font-size: 13px; color: #666; width: 110px; flex-shrink: 0; font-weight: 500; }
  .slider-row input[type="range"] { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: #e0e0e0; outline: none; cursor: pointer; }
  .slider-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #5b5bd6; cursor: pointer; border: 2.5px solid #fff; box-shadow: 0 0 0 1.5px #c0c0f0; }
  .slider-val { font-size: 14px; font-weight: 700; color: #5b5bd6; min-width: 45px; text-align: right; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(118px, 1fr)); gap: 10px; margin-bottom: 1.2rem; }
  .metric { background: #f7f7f5; border-radius: 10px; padding: 0.9rem 1rem; }
  .metric.highlight { background: #fffbee; border: 1.5px solid #f0d060; }
  .metric .m-label { font-size: 11px; color: #888; margin-bottom: 5px; font-weight: 500; }
  .metric .m-val { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .metric .m-sub { font-size: 11px; color: #aaa; margin-top: 3px; }
  .profit-pos { color: #1D9E75 !important; }
  .profit-neg { color: #E24B4A !important; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  thead th { background: #f7f7f5; font-weight: 700; color: #888; padding: 8px 10px; text-align: left; border-bottom: 1.5px solid #efefef; white-space: nowrap; }
  tbody td { padding: 7px 10px; border-bottom: 1px solid #f2f2f2; color: #333; white-space: nowrap; }
  tbody tr:last-child td { border-bottom: none; font-weight: 700; background: #f7f7f5; color: #1a1a1a; }
  .right { text-align: right; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 700; }
  .badge-f { background: #eaedff; color: #3a50d9; }
  .badge-v { background: #fff3e0; color: #c07000; }
  .legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: #888; font-weight: 500; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  footer { text-align: center; font-size: 12px; color: #ccc; margin-top: 2rem; padding-bottom: 2rem; }
  @media (max-width: 560px) { .input-grid { grid-template-columns: 1fr; } .metric-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>도넛 가게 수익 시뮬레이터</h1>
    <p>도넛/음료 매출을 직접 입력하고 매입률을 조정해 손익을 확인하세요.</p>
  </header>

  <div class="card">
    <p class="card-title">매출 입력</p>
    <div class="input-grid">
      <div class="input-group">
        <label>도넛 매출</label>
        <div class="input-wrapper">
          <input type="number" id="donutRev" value="12658682" step="500000" min="0">
          <span class="unit">원</span>
        </div>
        <div class="slider-row" style="margin-top:6px">
          <input type="range" id="donutRevSlider" min="3000000" max="30000000" value="12658682" step="500000">
          <span class="slider-val" id="donutRevOut">-</span>
        </div>
      </div>
      <div class="input-group">
        <label>음료 매출 <span style="font-size:11px;color:#aaa;font-weight:400">(도넛 매출의 20% 자동 산정)</span></label>
        <div style="padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:9px;background:#fafafa;font-size:14px;font-weight:600;color:#888" id="drinkRevDisplay">-</div>
      </div>
    </div>
    <div class="slider-row">
      <label>도넛 매입률</label>
      <input type="range" id="purchaseRate" min="25" max="55" value="45" step="1">
      <span class="slider-val" id="purchaseRateOut">45%</span>
    </div>
  </div>

  <div class="metric-grid">
    <div class="metric"><p class="m-label">총 매출</p><p class="m-val" id="mTotalRev">-</p></div>
    <div class="metric"><p class="m-label">고정비 합계</p><p class="m-val" id="mFixedCost">-</p><p class="m-sub" id="mFixedSub">-</p></div>
    <div class="metric"><p class="m-label">변동비 합계</p><p class="m-val" id="mVarCost">-</p><p class="m-sub" id="mVarSub">-</p></div>
    <div class="metric"><p class="m-label">총 비용</p><p class="m-val" id="mTotalCost">-</p></div>
    <div class="metric"><p class="m-label">순이익</p><p class="m-val" id="mNetProfit">-</p><p class="m-sub" id="mProfitRate">-</p></div>
    <div class="metric"><p class="m-label">도넛 원가율</p><p class="m-val" id="mDonutRate">-</p><p class="m-sub">비용 ÷ 도넛매출</p></div>
    <div class="metric"><p class="m-label">음료 원가율</p><p class="m-val" id="mDrinkRate">-</p><p class="m-sub">비용 ÷ 음료매출</p></div>
    <div class="metric highlight"><p class="m-label">도넛 매입 비용</p><p class="m-val" id="mPurchaseCost">-</p><p class="m-sub" id="mPurchaseSub">-</p></div>
  </div>

  <div class="card">
    <p class="card-title">비용 상세 내역</p>
    <div class="table-wrap">
      <table>
        <thead><tr><th style="width:26%">항목</th><th style="width:10%">구분</th><th class="right" style="width:21%">도넛 배분</th><th class="right" style="width:21%">음료 배분</th><th class="right" style="width:22%">합계</th></tr></thead>
        <tbody id="costBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <p class="card-title">도넛 vs 음료 손익</p>
    <div class="legend">
      <span><span class="dot" style="background:#378ADD"></span>매출</span>
      <span><span class="dot" style="background:#D85A30"></span>비용</span>
      <span><span class="dot" style="background:#1D9E75"></span>이익</span>
    </div>
    <div style="position:relative;height:280px;">
      <canvas id="simChart" role="img" aria-label="도넛 음료 손익 차트">도넛/음료 손익 차트</canvas>
    </div>
  </div>

  <footer>도넛 가게 수익 시뮬레이터 · 내부용</footer>
</div>

<script>
const BASE_DONUT = 12658682, BASE_DRINK = 2607605;
const B = { packaging_box:950000, packaging_etc:159707, packaging_drink:82365, coffee_bean:276000, drink_material:241709, kitchen:25410, hall:37724, misc:94220 };
const F = { labor:3650000, rent:5650000, pos:11000, net:24960, elec:250000, water:50000, ad:100000, baemin:300000, coupang:1200000, delivery:618182, drink_mach:9688, sub2:93750 };
const SD=5/6, SDR=1/6;
function fmtW(n){const v=Math.round(n);if(Math.abs(v)>=100000000)return(v/100000000).toFixed(1).replace(/\.0$/,'')+'억원';if(Math.abs(v)>=10000)return(v/10000).toFixed(0)+'만원';return v.toLocaleString()+'원';}
function fmtR(n){return Math.round(n).toLocaleString();}
function pct(n){return(n*100).toFixed(1)+'%';}
function fmtSlider(n){if(n>=10000000)return(n/10000000).toFixed(1).replace(/\.0$/,'')+'천만';if(n>=10000)return Math.round(n/10000)+'만원';return n.toLocaleString()+'원';}
function calcLabor(dr){if(dr>=27000000)return F.labor*1.3;if(dr>=24000000)return F.labor*1.2;if(dr>=21000000)return F.labor*1.1;return F.labor;}
let chart;
function calc(){
  const dr=parseFloat(document.getElementById('donutRev').value)||0;
  const rr=dr*0.2;
  const pr=document.getElementById('purchaseRate').value/100;
  document.getElementById('purchaseRateOut').textContent=Math.round(pr*100)+'%';
  const storeX=((dr-6000000)/6500000).toFixed(2);
  document.getElementById('donutRevOut').innerHTML=fmtSlider(dr)+' <span style="font-size:11px;font-weight:500;color:#aaa">× '+(dr/BASE_DONUT).toFixed(1)+'</span> <span style="font-size:11px;font-weight:700;color:#E24B4A">(기존 매장 × '+storeX+')</span>';
  document.getElementById('drinkRevDisplay').textContent=fmtW(rr);
  const total=dr+rr, dm=dr/BASE_DONUT, drm=rr/BASE_DRINK;
  const sc=dm*SD+drm*SDR;
  const purchase=dr*pr;
  const cardRate=total<25000000?0.004:0.01;
  const labor=calcLabor(dr);
  const rows=[
    {n:'인건비',f:false,d:labor*SD,dr:labor*SDR,t:labor},
    {n:'월세',f:true,d:F.rent*SD,dr:F.rent*SDR,t:F.rent},
    {n:'포스기',f:true,d:F.pos*SD,dr:F.pos*SDR,t:F.pos},
    {n:'인터넷/전화',f:true,d:F.net*SD,dr:F.net*SDR,t:F.net},
    {n:'전기세',f:true,d:F.elec*SD,dr:F.elec*SDR,t:F.elec},
    {n:'수도세',f:true,d:F.water*SD,dr:F.water*SDR,t:F.water},
    {n:'광고',f:true,d:F.ad*SD,dr:F.ad*SDR,t:F.ad},
    {n:'배민 각종비용',f:true,d:F.baemin*SD,dr:F.baemin*SDR,t:F.baemin},
    {n:'쿠팡 각종비용',f:true,d:F.coupang*SD,dr:F.coupang*SDR,t:F.coupang},
    {n:'배달비(대행사)',f:true,d:F.delivery*SD,dr:F.delivery*SDR,t:F.delivery},
    {n:'음료 기기',f:true,d:0,dr:F.drink_mach,t:F.drink_mach},
    {n:'11_서브',f:true,d:F.sub2*SD,dr:F.sub2*SDR,t:F.sub2},
    {n:'도넛 매입비',f:false,d:purchase,dr:0,t:purchase},
    {n:'포장_박스',f:false,d:B.packaging_box*dm,dr:0,t:B.packaging_box*dm},
    {n:'포장_기타',f:false,d:B.packaging_etc*dm,dr:0,t:B.packaging_etc*dm},
    {n:'포장_음료',f:false,d:0,dr:B.packaging_drink*drm,t:B.packaging_drink*drm},
    {n:'커피 원두',f:false,d:0,dr:B.coffee_bean*drm,t:B.coffee_bean*drm},
    {n:'음료 재료',f:false,d:0,dr:B.drink_material*drm,t:B.drink_material*drm},
    {n:'주방 관련',f:false,d:B.kitchen*sc*SD,dr:B.kitchen*sc*SDR,t:B.kitchen*sc},
    {n:'홀 관련',f:false,d:B.hall*sc*SD,dr:B.hall*sc*SDR,t:B.hall*sc},
    {n:'기타',f:false,d:B.misc*sc*SD,dr:B.misc*sc*SDR,t:B.misc*sc},
    {n:'카드수수료',f:false,d:total*cardRate*SD,dr:total*cardRate*SDR,t:total*cardRate},
  ];
  const fixT=rows.filter(r=>r.f).reduce((s,r)=>s+r.t,0);
  const varT=rows.filter(r=>!r.f).reduce((s,r)=>s+r.t,0);
  const totC=fixT+varT, net=total-totC;
  const dC=rows.reduce((s,r)=>s+r.d,0), rC=rows.reduce((s,r)=>s+r.dr,0);
  document.getElementById('mTotalRev').textContent=fmtW(total);
  document.getElementById('mFixedCost').textContent=fmtW(fixT);
  document.getElementById('mFixedSub').textContent=total>0?'매출의 '+pct(fixT/total):'-';
  document.getElementById('mVarCost').textContent=fmtW(varT);
  document.getElementById('mVarSub').textContent=total>0?'매출의 '+pct(varT/total):'-';
  document.getElementById('mTotalCost').textContent=fmtW(totC);
  const np=document.getElementById('mNetProfit');
  np.textContent=fmtW(net); np.className='m-val '+(net>=0?'profit-pos':'profit-neg');
  document.getElementById('mProfitRate').textContent='이익률 '+pct(total>0?net/total:0);
  document.getElementById('mDonutRate').textContent=dr>0?pct(dC/dr):'-';
  document.getElementById('mDrinkRate').textContent=rr>0?pct(rC/rr):'-';
  document.getElementById('mPurchaseCost').textContent=fmtW(purchase);
  document.getElementById('mPurchaseSub').textContent='도넛매출의 '+pct(pr);
  const tD=rows.reduce((s,r)=>s+r.d,0), tR=rows.reduce((s,r)=>s+r.dr,0);
  document.getElementById('costBody').innerHTML=rows.map(r=>`<tr><td>${r.n}</td><td><span class="badge ${r.f?'badge-f':'badge-v'}">${r.f?'고정':'변동'}</span></td><td class="right">${fmtR(r.d)}</td><td class="right">${fmtR(r.dr)}</td><td class="right">${fmtR(r.t)}</td></tr>`).join('')+`<tr><td>합계</td><td></td><td class="right">${fmtR(tD)}</td><td class="right">${fmtR(tR)}</td><td class="right">${fmtR(totC)}</td></tr>`;
  if(chart){chart.data.datasets[0].data=[Math.round(dr),Math.round(rr)];chart.data.datasets[1].data=[Math.round(dC),Math.round(rC)];chart.data.datasets[2].data=[Math.round(dr-dC),Math.round(rr-rC)];chart.update();}
  else{chart=new Chart(document.getElementById('simChart'),{type:'bar',data:{labels:['도넛','음료'],datasets:[{label:'매출',data:[Math.round(dr),Math.round(rr)],backgroundColor:'#378ADD',borderWidth:0},{label:'비용',data:[Math.round(dC),Math.round(rC)],backgroundColor:'#D85A30',borderWidth:0},{label:'이익',data:[Math.round(dr-dC),Math.round(rr-rC)],backgroundColor:'#1D9E75',borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>{if(Math.abs(v)>=10000000)return(v/10000000).toFixed(0)+'천만';if(Math.abs(v)>=10000)return(v/10000).toFixed(0)+'만';return v;}}}}}});}
}
document.getElementById('donutRevSlider').addEventListener('input',function(){document.getElementById('donutRev').value=this.value;calc();});
document.getElementById('donutRev').addEventListener('input',function(){const v=parseFloat(this.value)||0;document.getElementById('donutRevSlider').value=Math.min(Math.max(v,3000000),30000000);calc();});

document.getElementById('purchaseRate').addEventListener('input',calc);
calc();
</script>
</body>
</html>
